<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<form>
		<label for="name">Name</label>
		<input type="text" id="name" placeholder="Name">
	</br>
		<label for="phone">Phone Number</label>
		<input type="text" id="phone" placeholder="Phone Number">
	</br>
		<label for="address">Address</label>
		<input type="text" id="address" placeholder="Address">
	</br>
		<label>Have you ever lived with a Dog before?</label>
		<input type="checkbox" id="#checkbox" value=""Have you ever lived with a Dog before?">
	</br>
		<label for="multiSelect">Please select your preferred breeds</label>
		<select multiple id="multiSelect">
			<option>German Shepherd</option>
			<option>Golden Retriver</option>
			<option>Poodle</option>
			<option>BullDog</option>
		</select>
	</br>
		<button value="submit" type="submit">
	</form>

</body>

</html>
